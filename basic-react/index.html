<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- Link to the react library from unpkg.com -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Link to the Babel library from unpkg.com -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Import bootstrap from cdn -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Important React concepts: Components, Props, State -->
    <!-- https://www.cdn.miami.edu/_assets-common/php/searchblox/? -->
    <div id="app" class="container"></div>
    <script type="text/babel">
      const app = document.getElementById("app");
      // React Components
      function Header({ title }) {
        return <h1> {createTitle(title)} </h1>;
      }
      function Paragraph(props) {
        return <p>{props.text}</p>;
      }
      function createTitle(title) {
        if (title) {
          return title;
        } else {
          return "Default title";
        }
      }
      function getNextPage() {}
      function formatHtml(text) {
        //Formats html from a json api object
        return text;
      }

      function Results({ result }) {
        return (
          <div>
            {result.length > 0 && <h2>Search Results:</h2>}
            <Paragraph text={`Showing Page  of TotalPages`} />
            <Paragraph text={`Total Results: totalResults`} />

            <table className="table table-striped">
              <tbody>
                {result.map((res, index) => (
                  <tr key={res.uid}>
                    <td>
                      <strong>{res.alpha}</strong> <br />
                      {formatHtml(res.context)} <br />
                      <a href={res.url} target="_blank">
                        View
                      </a>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            <button className="btn btn-secondary" onClick={getNextPage}>
              Next Page
            </button>
          </div>
        );
      }

      function Homepage() {
        //react state

        // Search application
        const [searchTerm, setSearchTerm] = React.useState("");

        // track results
        const [searchResults, setSearchResults] = React.useState([]);

        function performSearch() {
          const searchUrl = `https://www.cdn.miami.edu/_assets-common/php/searchblox/?q=${searchTerm}`;
          fetch(searchUrl)
            .then((response) => response.json())
            .then((data) => {
              console.log("Search results: ", data);
              setSearchResults(data.result);
              // data.hits - total number of results
              // data.currentPage - current page number
              // data.lastPage
              // You can also update the state with the search results here
            })
            .catch((error) => {
              console.error("Error performing search: ", error);
            });
        }

        return (
          <>
            <Header title="Welcome to the search page" />
            <Paragraph text="Enter a search term below." />
            <div className="mb-3">
              <label className="form-label" htmlFor="search">
                Search:
              </label>
              <input
                className="form-control"
                type="text"
                id="search"
                name="search"
                placeholder="Search miami.edu..."
                value={searchTerm}
                onChange={(e) => setSearchTerm(e.target.value)}
              />
            </div>

            <button className="btn btn-primary" onClick={performSearch}>
              Search
            </button>
            <Results result={searchResults} />
          </>
        );
      }

      const root = ReactDOM.createRoot(app);
      root.render(<Homepage />);
    </script>
  </body>
</html>
